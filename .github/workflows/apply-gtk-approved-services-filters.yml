name: Apply GTK approved services filters

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gtk-approved-services-filters
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-gtk-approved-services-filters.py
      - run: cargo fmt --all
      - name: Commit approved service filters
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs crates/software-center/src/service_view.rs
          git commit -m "feat(services): add search and state filters"
          git push origin HEAD:feat/gtk-approved-services-filters
