name: Format transaction lifecycle events

on:
  push:
    branches:
      - feat/transaction-lifecycle-events

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/transaction-lifecycle-events
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: format transaction lifecycle events"
          git push origin HEAD:feat/transaction-lifecycle-events
