name: Apply live simulation subprocess runner

on:
  push:
    branches:
      - feat/live-simulation-subprocess-runner

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/live-simulation-subprocess-runner
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Add live simulation lifecycle
        run: |
          python3 - <<'PY'
          from pathlib import Path

          transaction = Path('crates/genixpkgd/src/transaction.rs')
          text = transaction.read_text()
          text = text.replace(
              'const STATE_COMPLETED: &str = "completed";\nconst STATE_CANCELLED:',
              'const STATE_COMPLETED: &str = "completed";\nconst STATE_FAILED: &str = "failed";\nconst STATE_CANCELLED:',
              1,
          )

          old_begin = '''    pub fn begin_next_simulation(&self) -> anyhow::Result<(TransactionRecord, TransactionEvent)> {
                  let mut state = self
                      .state
                      .lock()
                      .map_err(|_| anyhow::anyhow!("transaction manager lock was poisoned"))?;
                  if state.active.is_some() {
                      bail!("a transaction simulation is already active");
                  }
                  let transaction_id = *state
                      .queue
                      .front()
                      .context("no queued transaction is available for simulation")?;
                  let mut record = state
                      .records
                      .get(&transaction_id)
                      .cloned()
                      .with_context(|| format!("transaction {transaction_id} was not found"))?;
                  record.state = STATE_RUNNING.to_owned();
                  record.progress_basis_points = 1_000;
                  record.can_cancel = false;
                  record.updated_unix_ms = now_unix_ms();
                  record.message =
                      "Simulation runner started; no package command will be executed".to_owned();
                  let event = self.record_event("running", &record, "info");

                  self.journal.append(&record)?;
                  state.queue.pop_front();
                  state.active = Some(transaction_id);
                  state.records.insert(transaction_id, record.clone());
                  push_event(&mut state.events, event.clone());
                  Ok((record, event))
              }
          '''
          new_begin = '''    pub fn begin_next_simulation(
                  &self,
              ) -> anyhow::Result<(TransactionRecord, TransactionPreview, TransactionEvent)> {
                  let mut state = self
                      .state
                      .lock()
                      .map_err(|_| anyhow::anyhow!("transaction manager lock was poisoned"))?;
                  if state.active.is_some() {
                      bail!("a transaction simulation is already active");
                  }
                  let transaction_id = *state
                      .queue
                      .front()
                      .context("no queued transaction is available for simulation")?;
                  let mut record = state
                      .records
                      .get(&transaction_id)
                      .cloned()
                      .with_context(|| format!("transaction {transaction_id} was not found"))?;
                  let preview = state
                      .previews
                      .get(&record.preview_id)
                      .cloned()
                      .with_context(|| {
                          format!("transaction preview {} was not found", record.preview_id)
                      })?;
                  record.state = STATE_RUNNING.to_owned();
                  record.progress_basis_points = 1_000;
                  record.can_cancel = false;
                  record.updated_unix_ms = now_unix_ms();
                  record.message =
                      "APT simulation subprocess started; package mutation remains disabled"
                          .to_owned();
                  let event = self.record_event("running", &record, "info");

                  self.journal.append(&record)?;
                  state.queue.pop_front();
                  state.active = Some(transaction_id);
                  state.records.insert(transaction_id, record.clone());
                  push_event(&mut state.events, event.clone());
                  Ok((record, preview, event))
              }
          '''
          if old_begin in text:
              text = text.replace(old_begin, new_begin, 1)
          elif new_begin not in text:
              raise SystemExit('begin simulation marker not found')

          complete_end = '''    pub fn complete_simulation(
                  &self,
                  transaction_id: u64,
              ) -> anyhow::Result<(TransactionRecord, TransactionEvent)> {
                  let mut state = self
                      .state
                      .lock()
                      .map_err(|_| anyhow::anyhow!("transaction manager lock was poisoned"))?;
                  if state.active != Some(transaction_id) {
                      bail!("transaction {transaction_id} is not the active simulation");
                  }
                  let mut record = state
                      .records
                      .get(&transaction_id)
                      .cloned()
                      .with_context(|| format!("transaction {transaction_id} was not found"))?;
                  if record.state != STATE_RUNNING {
                      bail!("transaction {transaction_id} is not running");
                  }
                  record.state = STATE_COMPLETED.to_owned();
                  record.progress_basis_points = 10_000;
                  record.can_cancel = false;
                  record.updated_unix_ms = now_unix_ms();
                  record.message = "Simulation completed successfully; no packages were changed".to_owned();
                  let event = self.record_event("completed", &record, "info");

                  self.journal.append(&record)?;
                  state.active = None;
                  state.records.insert(transaction_id, record.clone());
                  push_event(&mut state.events, event.clone());
                  Ok((record, event))
              }
          '''
          fail_method = '''
              pub fn fail_simulation(
                  &self,
                  transaction_id: u64,
                  message: &str,
              ) -> anyhow::Result<(TransactionRecord, TransactionEvent)> {
                  let mut state = self
                      .state
                      .lock()
                      .map_err(|_| anyhow::anyhow!("transaction manager lock was poisoned"))?;
                  if state.active != Some(transaction_id) {
                      bail!("transaction {transaction_id} is not the active simulation");
                  }
                  let mut record = state
                      .records
                      .get(&transaction_id)
                      .cloned()
                      .with_context(|| format!("transaction {transaction_id} was not found"))?;
                  if record.state != STATE_RUNNING {
                      bail!("transaction {transaction_id} is not running");
                  }
                  record.state = STATE_FAILED.to_owned();
                  record.can_cancel = false;
                  record.updated_unix_ms = now_unix_ms();
                  record.message = message.to_owned();
                  let event = self.record_event("failed", &record, "error");

                  self.journal.append(&record)?;
                  state.active = None;
                  state.records.insert(transaction_id, record.clone());
                  push_event(&mut state.events, event.clone());
                  Ok((record, event))
              }
          '''
          if fail_method not in text:
              if complete_end not in text:
                  raise SystemExit('complete simulation marker not found')
              text = text.replace(complete_end, complete_end + fail_method, 1)

          text = text.replace(
              'let (running, running_event) = manager\n            .begin_next_simulation()',
              'let (running, reviewed_preview, running_event) = manager\n            .begin_next_simulation()',
              1,
          )
          text = text.replace(
              '        assert_eq!(running.state, "running");\n        assert_eq!(running_event.event, "running");',
              '        assert_eq!(running.state, "running");\n        assert_eq!(reviewed_preview.id, first.id);\n        assert_eq!(running_event.event, "running");',
              1,
          )

          failure_test = '''
              #[test]
              fn failed_simulation_releases_the_active_slot() {
                  let (manager, path) = manager();
                  let (preview, _) = manager
                      .create_preview(preview("install", "curl"))
                      .expect("preview should be created");
                  let (record, _) = manager
                      .queue_preview(preview.id)
                      .expect("preview should queue");
                  manager
                      .begin_next_simulation()
                      .expect("simulation should start");

                  let (failed, event) = manager
                      .fail_simulation(record.id, "APT simulation failed")
                      .expect("simulation should fail cleanly");
                  assert_eq!(failed.state, "failed");
                  assert_eq!(event.event, "failed");
                  assert_eq!(event.level, "error");
                  assert!(!manager.snapshot().expect("snapshot should load").has_active);
                  fs::remove_file(path).expect("test journal should be removable");
              }
          '''
          cancellation_marker = '''    #[test]
              fn cancellation_is_limited_to_queued_transactions() {
          '''
          if failure_test not in text:
              if cancellation_marker not in text:
                  raise SystemExit('cancellation test marker not found')
              text = text.replace(cancellation_marker, failure_test + '\n' + cancellation_marker, 1)
          transaction.write_text(text)

          main = Path('crates/genixpkgd/src/main.rs')
          text = main.read_text()
          old_run = '''        let (running, running_event) = self
                  .transactions
                  .begin_next_simulation()
                  .map_err(dbus_failed)?;
              Self::emit_lifecycle_event(&emitter, &running_event).await;

              let (_, progress_event) = self
                  .transactions
                  .update_simulation_progress(
                      running.id,
                      5_000,
                      "Replaying the stored APT simulation; no package command is running",
                  )
                  .map_err(dbus_failed)?;
              Self::emit_lifecycle_event(&emitter, &progress_event).await;

              let (completed, completed_event) = self
                  .transactions
                  .complete_simulation(running.id)
                  .map_err(dbus_failed)?;
              Self::emit_lifecycle_event(&emitter, &completed_event).await;
              Ok(completed)
          '''
          new_run = '''        let (running, reviewed_preview, running_event) = self
                  .transactions
                  .begin_next_simulation()
                  .map_err(dbus_failed)?;
              Self::emit_lifecycle_event(&emitter, &running_event).await;

              let simulation = match apt_simulation::simulate(&running.kind, &running.package).await {
                  Ok(simulation) => simulation,
                  Err(error) => {
                      let message = format!("APT simulation subprocess failed: {error}");
                      let (failed, failed_event) = self
                          .transactions
                          .fail_simulation(running.id, &message)
                          .map_err(dbus_failed)?;
                      Self::emit_lifecycle_event(&emitter, &failed_event).await;
                      return Err(zbus::fdo::Error::Failed(failed.message));
                  }
              };

              let preview_changed = simulation.changes != reviewed_preview.changes
                  || simulation.download_size_bytes != reviewed_preview.download_size_bytes
                  || simulation.installed_size_delta_bytes
                      != reviewed_preview.installed_size_delta_bytes;
              if preview_changed {
                  let message =
                      "APT simulation changed since review; create and approve a new preview";
                  let (failed, failed_event) = self
                      .transactions
                      .fail_simulation(running.id, message)
                      .map_err(dbus_failed)?;
                  Self::emit_lifecycle_event(&emitter, &failed_event).await;
                  return Err(zbus::fdo::Error::Failed(failed.message));
              }

              let progress_message = format!("APT simulation verified: {}", simulation.summary);
              let (_, progress_event) = self
                  .transactions
                  .update_simulation_progress(running.id, 9_000, &progress_message)
                  .map_err(dbus_failed)?;
              Self::emit_lifecycle_event(&emitter, &progress_event).await;

              let (completed, completed_event) = self
                  .transactions
                  .complete_simulation(running.id)
                  .map_err(dbus_failed)?;
              Self::emit_lifecycle_event(&emitter, &completed_event).await;
              Ok(completed)
          '''
          if old_run in text:
              text = text.replace(old_run, new_run, 1)
          elif new_run not in text:
              raise SystemExit('D-Bus simulation runner marker not found')
          main.write_text(text)
          PY
          cargo fmt --all
      - name: Commit live simulation runner
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/main.rs crates/genixpkgd/src/transaction.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat(transactions): run and verify live APT simulations"
          git push origin HEAD:feat/live-simulation-subprocess-runner
