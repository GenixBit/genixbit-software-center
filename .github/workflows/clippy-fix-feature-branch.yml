name: Clippy fix feature branch

on:
  push:
    branches:
      - feat/read-only-package-catalog

permissions:
  contents: write

jobs:
  clippy-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/read-only-package-catalog
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Apply Clippy suggestions
        run: cargo clippy --fix --workspace --all-targets --allow-dirty --allow-staged
      - name: Apply rustfmt
        run: cargo fmt --all
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style: apply Clippy suggestions"
          git push origin HEAD:feat/read-only-package-catalog
