name: Capture accessibility Clippy diagnostic

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'feat/accessibility-keyboard-navigation'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Capture concise diagnostic
        run: |
          set +e
          cargo clippy --workspace --all-targets --message-format=short -- -D warnings > clippy-diagnostic.txt 2>&1
          status=$?
          echo "exit_status=$status" >> clippy-diagnostic.txt
          rm .github/workflows/clippy-accessibility-diagnostic.yml
          exit 0
      - name: Commit diagnostic
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: capture accessibility Clippy diagnostic'
          git push
