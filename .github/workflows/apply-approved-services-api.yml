name: Apply approved services API

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/read-only-approved-services-api
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-approved-services-api.py
      - run: cargo fmt --all
      - name: Commit approved services API
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/main.rs crates/genixpkgd/src/systemd.rs crates/package-model/src/lib.rs dbus/com.genixbit.PackageManager1.xml
          git commit -m "feat(services): expose approved service metadata"
          git push origin HEAD:feat/read-only-approved-services-api
