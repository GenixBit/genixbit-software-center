name: Apply persistent transaction event history

on:
  push:
    branches:
      - feat/persistent-transaction-event-history
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/persistent-transaction-event-history
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-persistent-event-history.py
      - run: cargo fmt --all
      - name: Commit persistent event history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/event_journal.rs crates/genixpkgd/src/main.rs crates/genixpkgd/src/transaction.rs
          git commit -m "feat(events): restore persistent lifecycle history"
          git push origin HEAD:feat/persistent-transaction-event-history
