name: Apply immutable APT plan

on:
  push:
    branches:
      - feat/immutable-apt-execution-plans

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/immutable-apt-execution-plans
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Route simulations through immutable plans
        run: |
          python3 - <<'PY'
          from pathlib import Path

          main = Path('crates/genixpkgd/src/main.rs')
          main_text = main.read_text()
          if 'mod apt_plan;' not in main_text:
              marker = 'mod apt;\n'
              if marker not in main_text:
                  raise SystemExit('APT module marker not found')
              main_text = main_text.replace(marker, marker + 'mod apt_plan;\n', 1)
              main.write_text(main_text)

          simulation = Path('crates/genixpkgd/src/apt_simulation.rs')
          text = simulation.read_text()
          text = text.replace(
              'use anyhow::Context;\nuse genixbit_package_model::TransactionChange;',
              'use anyhow::{Context, bail};\nuse genixbit_package_model::TransactionChange;',
              1,
          )
          old_imports = '''use anyhow::{Context, bail};
          use genixbit_package_model::TransactionChange;
          use tokio::process::Command;
          '''
          new_imports = '''use anyhow::{Context, bail};
          use genixbit_package_model::TransactionChange;

          use crate::apt_plan::AptCommandPlan;
          '''
          if old_imports in text:
              text = text.replace(old_imports, new_imports, 1)
          elif new_imports not in text:
              raise SystemExit('APT simulation imports marker not found')

          old_builder = '''    let mut command = Command::new("apt-get");
              command
                  .arg("--simulate")
                  .env("LC_ALL", "C")
                  .env("DEBIAN_FRONTEND", "noninteractive")
                  .kill_on_drop(true);

              match kind {
                  "install" => {
                      command.arg("install").arg(package);
                  }
                  "remove" => {
                      command.arg("remove").arg(package);
                  }
                  "upgrade" => {
                      command.args(["install", "--only-upgrade", package]);
                  }
                  _ => bail!("unsupported APT simulation kind {kind}"),
              }
          '''
          new_builder = '''    let plan = AptCommandPlan::simulation(kind, package)?;
              let mut command = plan.command()?;
          '''
          if old_builder in text:
              text = text.replace(old_builder, new_builder, 1)
          elif new_builder not in text:
              raise SystemExit('APT command builder marker not found')

          simulation.write_text(text)
          PY
          cargo fmt --all
      - name: Commit APT plan wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/main.rs crates/genixpkgd/src/apt_simulation.rs crates/genixpkgd/src/apt_plan.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "refactor(apt): execute simulations from immutable plans"
          git push origin HEAD:feat/immutable-apt-execution-plans
