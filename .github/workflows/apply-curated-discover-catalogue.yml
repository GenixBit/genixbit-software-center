name: Apply curated Discover catalogue

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/curated-discover-catalogue
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-curated-discover-catalogue.py
      - run: cargo fmt --all
      - name: Commit curated Discover catalogue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/package-model/src/lib.rs crates/genixpkgd/src/appstream.rs crates/genixpkgd/src/main.rs crates/software-center/src/client.rs crates/software-center/src/main.rs dbus/com.genixbit.PackageManager1.xml docs/ROADMAP.md
          git commit -m "feat(discover): add curated AppStream catalogue"
          git push origin HEAD:feat/curated-discover-catalogue
