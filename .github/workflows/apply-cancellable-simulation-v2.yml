name: Apply cancellable simulation v2

on:
  push:
    branches:
      - feat/cancellable-simulation-subprocess
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/cancellable-simulation-subprocess
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-cancellable-simulation.py
      - run: cargo fmt --all
      - name: Commit cancellation wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml crates/genixpkgd/src/apt_live.rs crates/genixpkgd/src/main.rs crates/genixpkgd/src/simulation_control.rs crates/genixpkgd/src/transaction.rs
          git commit -m "feat(transactions): cancel the active APT simulation subprocess"
          git push origin HEAD:feat/cancellable-simulation-subprocess
