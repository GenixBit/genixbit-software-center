name: Apply caller-aware PolicyKit wiring

on:
  push:
    branches:
      - feat/caller-aware-polkit-authorization

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/caller-aware-polkit-authorization
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Bind privileged controls to the D-Bus caller
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/genixpkgd/src/main.rs')
          text = path.read_text()

          old_import = 'use zbus::{connection, interface, object_server::SignalEmitter};'
          new_import = 'use zbus::{Connection, connection, interface, message::Header, object_server::SignalEmitter};'
          if old_import in text:
              text = text.replace(old_import, new_import, 1)
          elif new_import not in text:
              raise SystemExit('zbus import marker not found')

          old_queue = '''    async fn queue_transaction(
                  &self,
                  preview_id: u64,
                  #[zbus(signal_emitter)] emitter: SignalEmitter<'_>,
              ) -> zbus::fdo::Result<TransactionRecord> {
                  self.authorization
                      .authorize_transaction_control("queueing a package transaction")?;
                  let (record, event) = self
                      .transactions
                      .queue_preview(preview_id)
                      .map_err(dbus_failed)?;
                  Self::emit_lifecycle_event(&emitter, &event).await;
                  Ok(record)
              }
          '''
          new_queue = '''    async fn queue_transaction(
                  &self,
                  preview_id: u64,
                  #[zbus(connection)] connection: &Connection,
                  #[zbus(header)] header: Header<'_>,
                  #[zbus(signal_emitter)] emitter: SignalEmitter<'_>,
              ) -> zbus::fdo::Result<TransactionRecord> {
                  let sender = header.sender().ok_or_else(|| {
                      zbus::fdo::Error::AccessDenied(
                          "missing authenticated D-Bus caller identity".to_owned(),
                      )
                  })?;
                  self.authorization
                      .authorize_transaction_control(
                          connection,
                          sender,
                          "queueing a package transaction",
                      )
                      .await?;
                  let (record, event) = self
                      .transactions
                      .queue_preview(preview_id)
                      .map_err(dbus_failed)?;
                  Self::emit_lifecycle_event(&emitter, &event).await;
                  Ok(record)
              }
          '''

          old_cancel = '''    async fn cancel_transaction(
                  &self,
                  transaction_id: u64,
                  #[zbus(signal_emitter)] emitter: SignalEmitter<'_>,
              ) -> zbus::fdo::Result<TransactionRecord> {
                  self.authorization
                      .authorize_transaction_control("cancelling a package transaction")?;
                  let (record, event) = self
                      .transactions
                      .cancel(transaction_id)
                      .map_err(dbus_failed)?;
                  Self::emit_lifecycle_event(&emitter, &event).await;
                  Ok(record)
              }
          '''
          new_cancel = '''    async fn cancel_transaction(
                  &self,
                  transaction_id: u64,
                  #[zbus(connection)] connection: &Connection,
                  #[zbus(header)] header: Header<'_>,
                  #[zbus(signal_emitter)] emitter: SignalEmitter<'_>,
              ) -> zbus::fdo::Result<TransactionRecord> {
                  let sender = header.sender().ok_or_else(|| {
                      zbus::fdo::Error::AccessDenied(
                          "missing authenticated D-Bus caller identity".to_owned(),
                      )
                  })?;
                  self.authorization
                      .authorize_transaction_control(
                          connection,
                          sender,
                          "cancelling a package transaction",
                      )
                      .await?;
                  let (record, event) = self
                      .transactions
                      .cancel(transaction_id)
                      .map_err(dbus_failed)?;
                  Self::emit_lifecycle_event(&emitter, &event).await;
                  Ok(record)
              }
          '''

          old_run = '''    async fn run_next_simulation(
                  &self,
                  #[zbus(signal_emitter)] emitter: SignalEmitter<'_>,
              ) -> zbus::fdo::Result<TransactionRecord> {
                  self.authorization
                      .authorize_transaction_control("running a simulated package transaction")?;

                  let (running, running_event) = self
                      .transactions
                      .begin_next_simulation()
                      .map_err(dbus_failed)?;
          '''
          new_run = '''    async fn run_next_simulation(
                  &self,
                  #[zbus(connection)] connection: &Connection,
                  #[zbus(header)] header: Header<'_>,
                  #[zbus(signal_emitter)] emitter: SignalEmitter<'_>,
              ) -> zbus::fdo::Result<TransactionRecord> {
                  let sender = header.sender().ok_or_else(|| {
                      zbus::fdo::Error::AccessDenied(
                          "missing authenticated D-Bus caller identity".to_owned(),
                      )
                  })?;
                  self.authorization
                      .authorize_transaction_control(
                          connection,
                          sender,
                          "running a simulated package transaction",
                      )
                      .await?;

                  let (running, running_event) = self
                      .transactions
                      .begin_next_simulation()
                      .map_err(dbus_failed)?;
          '''

          replacements = [
              ('queue method', old_queue, new_queue),
              ('cancel method', old_cancel, new_cancel),
              ('run method', old_run, new_run),
          ]
          for name, old, new in replacements:
              if old in text:
                  text = text.replace(old, new, 1)
              elif new not in text:
                  raise SystemExit(f'{name} marker not found')

          path.write_text(text)
          PY
          cargo fmt --all
      - name: Commit caller-aware authorization wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/main.rs crates/genixpkgd/src/authorization.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat(dbus): authorize the authenticated transaction caller"
          git push origin HEAD:feat/caller-aware-polkit-authorization
