name: Finalize GTK pagination fix

on:
  push:
    branches:
      - feat/gtk-featured-pagination

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gtk-featured-pagination
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Deduplicate featured collection functions
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/software-center/src/main.rs')
          text = path.read_text()
          marker = 'fn start_featured_collections_load(ui: &UiState) {'
          first = text.index(marker)
          second = text.find(marker, first + len(marker))
          if second == -1:
              raise SystemExit('expected duplicated featured collection functions')
          catalog = text.index('fn start_catalog_search(ui: &UiState) {', second)
          text = text[:second] + text[catalog:]
          if text.count(marker) != 1:
              raise SystemExit('featured collection loader was not deduplicated')
          if text.count('fn render_featured_collections(') != 1:
              raise SystemExit('featured collection renderer was not deduplicated')
          path.write_text(text)
          PY
          cargo fmt --all
      - name: Restore clean repository state
        run: |
          rm -f ci-merge-check.log ci-merge-check.exit
          cat > .github/workflows/ci.yml <<'YAML'
          name: CI

          on:
            push:
              branches: [main]
            pull_request:

          permissions:
            contents: read

          jobs:
            rust:
              runs-on: ubuntu-24.04
              steps:
                - uses: actions/checkout@v4
                - name: Install native dependencies
                  run: |
                    sudo apt-get update
                    sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libdbus-1-dev
                - uses: dtolnay/rust-toolchain@stable
                  with:
                    components: rustfmt, clippy
                - uses: Swatinem/rust-cache@v2
                - name: Format
                  run: cargo fmt --all -- --check
                - name: Check
                  run: cargo check --workspace --all-targets
                - name: Test
                  run: cargo test --workspace
                - name: Clippy
                  run: cargo clippy --workspace --all-targets -- -D warnings
          YAML
          rm .github/workflows/finalize-gtk-pagination-fix.yml
      - name: Commit final fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: deduplicate GTK featured collection handlers"
          git push origin HEAD:feat/gtk-featured-pagination
