name: Apply APT log streaming v2

on:
  push:
    branches:
      - feat/apt-simulation-log-streaming
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/apt-simulation-log-streaming
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-apt-log-streaming.py
      - run: cargo fmt --all
      - name: Commit log streaming
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/apt_live.rs crates/genixpkgd/src/main.rs crates/genixpkgd/src/transaction.rs
          git commit -m "feat(transactions): stream APT simulation log events"
          git push origin HEAD:feat/apt-simulation-log-streaming
