name: Format featured catalogue branch

on:
  push:
    branches:
      - feat/featured-collections-pagination

permissions:
  contents: write

jobs:
  rustfmt:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/featured-collections-pagination
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply rustfmt
        run: cargo fmt --all
      - name: Commit formatting
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates
          git commit -m "style: apply rustfmt"
          git push origin HEAD:feat/featured-collections-pagination
