name: Apply simulated runner API

on:
  push:
    branches:
      - feat/simulated-transaction-runner

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/simulated-transaction-runner
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Add protected simulation runner method
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/genixpkgd/src/main.rs')
          text = path.read_text()
          marker = '''    async fn transaction_queue(&self) -> zbus::fdo::Result<TransactionQueueSnapshot> {
                  self.transactions.snapshot().map_err(dbus_failed)
              }
          '''
          addition = '''    async fn run_next_simulation(
                  &self,
                  #[zbus(signal_emitter)] emitter: SignalEmitter<'_>,
              ) -> zbus::fdo::Result<TransactionRecord> {
                  self.authorization
                      .authorize_transaction_control("running a simulated package transaction")?;

                  let (running, running_event) = self
                      .transactions
                      .begin_next_simulation()
                      .map_err(dbus_failed)?;
                  Self::emit_lifecycle_event(&emitter, &running_event).await;

                  let (_, progress_event) = self
                      .transactions
                      .update_simulation_progress(
                          running.id,
                          5_000,
                          "Replaying the stored APT simulation; no package command is running",
                      )
                      .map_err(dbus_failed)?;
                  Self::emit_lifecycle_event(&emitter, &progress_event).await;

                  let (completed, completed_event) = self
                      .transactions
                      .complete_simulation(running.id)
                      .map_err(dbus_failed)?;
                  Self::emit_lifecycle_event(&emitter, &completed_event).await;
                  Ok(completed)
              }

          ''' + marker
          if marker not in text:
              raise SystemExit('transaction queue marker not found')
          path.write_text(text.replace(marker, addition, 1))
          PY
          cargo fmt --all
      - name: Commit API wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/main.rs crates/genixpkgd/src/transaction.rs
          git commit -m "feat(dbus): expose protected simulation-only runner"
          git push origin HEAD:feat/simulated-transaction-runner
