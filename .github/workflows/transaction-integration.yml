name: Transaction integration

on:
  pull_request:
    paths:
      - 'crates/genixpkgd/**'
      - 'crates/package-model/**'
      - 'tests/container/**'
      - 'scripts/test-transaction-container.sh'
      - '.github/workflows/transaction-integration.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  push:
    branches: [main]
    paths:
      - 'crates/genixpkgd/**'
      - 'crates/package-model/**'
      - 'tests/container/**'
      - 'scripts/test-transaction-container.sh'
      - '.github/workflows/transaction-integration.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: read

jobs:
  disposable-ubuntu:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build and test transaction container
        run: bash scripts/test-transaction-container.sh
