name: Diagnose featured catalog branch

on:
  push:
    branches:
      - feat/featured-catalog-and-pagination

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/featured-catalog-and-pagination
      - name: Install native dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev libdbus-1-dev >/dev/null
      - uses: dtolnay/rust-toolchain@stable
      - name: Capture cargo check
        run: cargo check --workspace --all-targets > ci-check.log 2>&1 || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-check.log
          git commit -m "chore: capture catalog compile diagnostics"
          git push origin HEAD:feat/featured-catalog-and-pagination
