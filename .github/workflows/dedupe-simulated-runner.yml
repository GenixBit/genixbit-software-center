name: Deduplicate simulated runner

on:
  push:
    branches:
      - feat/simulated-transaction-runner

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/simulated-transaction-runner
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Remove duplicate method
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/genixpkgd/src/main.rs')
          text = path.read_text()
          block = '''    async fn run_next_simulation(
                  &self,
                  #[zbus(signal_emitter)] emitter: SignalEmitter<'_>,
              ) -> zbus::fdo::Result<TransactionRecord> {
                  self.authorization
                      .authorize_transaction_control("running a simulated package transaction")?;

                  let (running, running_event) = self
                      .transactions
                      .begin_next_simulation()
                      .map_err(dbus_failed)?;
                  Self::emit_lifecycle_event(&emitter, &running_event).await;

                  let (_, progress_event) = self
                      .transactions
                      .update_simulation_progress(
                          running.id,
                          5_000,
                          "Replaying the stored APT simulation; no package command is running",
                      )
                      .map_err(dbus_failed)?;
                  Self::emit_lifecycle_event(&emitter, &progress_event).await;

                  let (completed, completed_event) = self
                      .transactions
                      .complete_simulation(running.id)
                      .map_err(dbus_failed)?;
                  Self::emit_lifecycle_event(&emitter, &completed_event).await;
                  Ok(completed)
              }

          '''
          if text.count(block) != 2:
              raise SystemExit(f'expected two runner methods, found {text.count(block)}')
          path.write_text(text.replace(block + block, block, 1))
          PY
          cargo fmt --all
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/main.rs
          git commit -m "fix(dbus): remove duplicate simulated runner method"
          git push origin HEAD:feat/simulated-transaction-runner
