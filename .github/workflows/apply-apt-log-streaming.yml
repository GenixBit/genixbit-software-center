name: Apply APT simulation log streaming

on:
  push:
    branches:
      - feat/apt-simulation-log-streaming

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/apt-simulation-log-streaming
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Wire log events
        run: |
          python3 - <<'PY'
          from pathlib import Path

          transaction = Path('crates/genixpkgd/src/transaction.rs')
          text = transaction.read_text()
          cancel_start = text.index('    pub fn request_simulation_cancellation(')
          if '    pub fn record_simulation_log(' not in text:
              method = '''    pub fn record_simulation_log(
              &self,
              transaction_id: u64,
              level: &str,
              message: &str,
          ) -> anyhow::Result<TransactionEvent> {
              if !matches!(level, "info" | "error") {
                  bail!("unsupported simulation log level {level}");
              }
              if message.trim().is_empty() {
                  bail!("simulation log message cannot be empty");
              }
              let mut state = self
                  .state
                  .lock()
                  .map_err(|_| anyhow::anyhow!("transaction manager lock was poisoned"))?;
              if state.active != Some(transaction_id) {
                  bail!("transaction {transaction_id} is not the active simulation");
              }
              let mut record = state
                  .records
                  .get(&transaction_id)
                  .cloned()
                  .with_context(|| format!("transaction {transaction_id} was not found"))?;
              if record.state != STATE_RUNNING {
                  bail!("transaction {transaction_id} is not running");
              }
              record.updated_unix_ms = now_unix_ms();
              record.message = message.to_owned();
              let event = self.record_event("log", &record, level);

              state.records.insert(transaction_id, record);
              push_event(&mut state.events, event.clone());
              Ok(event)
          }

          '''
              text = text[:cancel_start] + method + text[cancel_start:]

          if 'fn simulation_logs_are_bounded_to_the_active_transaction()' not in text:
              marker = '    #[test]\n    fn active_simulation_supports_requested_cancellation() {'
              test = '''    #[test]
          fn simulation_logs_are_bounded_to_the_active_transaction() {
              let (manager, path) = manager();
              let (preview, _) = manager
                  .create_preview(preview("install", "curl"))
                  .expect("preview should be created");
              let (record, _) = manager
                  .queue_preview(preview.id)
                  .expect("preview should queue");
              manager
                  .begin_next_simulation()
                  .expect("simulation should start");

              let info = manager
                  .record_simulation_log(record.id, "info", "Reading package lists")
                  .expect("info log should record");
              let error = manager
                  .record_simulation_log(record.id, "error", "APT warning")
                  .expect("error log should record");
              assert_eq!(info.event, "log");
              assert_eq!(info.level, "info");
              assert_eq!(error.level, "error");
              assert!(manager.record_simulation_log(record.id, "debug", "no").is_err());
              assert!(manager.record_simulation_log(record.id, "info", "").is_err());
              manager
                  .cancel_active_simulation(record.id)
                  .expect("simulation should cancel");
              assert!(manager.record_simulation_log(record.id, "info", "late").is_err());
              fs::remove_file(path).expect("test journal should be removable");
          }

          '''
              if marker not in text:
                  raise SystemExit('log test marker not found')
              text = text.replace(marker, test + marker, 1)
          transaction.write_text(text)

          main = Path('crates/genixpkgd/src/main.rs')
          text = main.read_text()
          old = '''        let outcome = apt_live::run_cancellable(&running.kind, &running.package, cancellation).await;
              if let Err(error) = self.simulation_control.clear(running.id).await {
          '''
          new = '''        let (log_sender, mut log_receiver) = tokio::sync::mpsc::channel(64);
              let mut simulation = Box::pin(apt_live::run_cancellable(
                  &running.kind,
                  &running.package,
                  cancellation,
                  log_sender,
              ));
              let mut logs_open = true;
              let outcome = loop {
                  tokio::select! {
                      result = &mut simulation => break result,
                      log = log_receiver.recv(), if logs_open => {
                          match log {
                              Some(log) => {
                                  match self.transactions.record_simulation_log(
                                      running.id,
                                      &log.level,
                                      &log.message,
                                  ) {
                                      Ok(event) => Self::emit_lifecycle_event(&emitter, &event).await,
                                      Err(error) => break Err(error),
                                  }
                              }
                              None => logs_open = false,
                          }
                      }
                  }
              };
              drop(simulation);
              if let Err(error) = self.simulation_control.clear(running.id).await {
          '''
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('live simulation call marker not found')
          main.write_text(text)
          PY
          cargo fmt --all
      - name: Commit log streaming
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/apt_live.rs crates/genixpkgd/src/main.rs crates/genixpkgd/src/transaction.rs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "feat(transactions): stream APT simulation log events"
          git push origin HEAD:feat/apt-simulation-log-streaming
