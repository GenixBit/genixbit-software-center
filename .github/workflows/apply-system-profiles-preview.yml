name: Apply System Profiles preview

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/system-profiles-preview
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Normalize profile patch and encoding
        run: |
          python3 - <<'PY'
          from pathlib import Path

          script_path = Path("scripts/apply-system-profiles-preview.py")
          script = script_path.read_text()
          start = script.index('text = replace_once(\n    text,\n    "    ui.stacks_status.set_text(message);\\n",')
          end = script.index('path.write_text(text)', start)
          replacement = '''text = replace_once(
              text,
              "    ui.services_status.set_text(message);\\n    ui.stacks_status.set_text(message);\\n    ui.activity_summary.set_text(\\\"Activity summary not loaded.\\\");\\n",
              "    ui.services_status.set_text(message);\\n    ui.stacks_status.set_text(message);\\n    ui.profiles_status.set_text(message);\\n    ui.activity_summary.set_text(\\\"Activity summary not loaded.\\\");\\n",
              path,
          )
          text = replace_once(
              text,
              "    ui.services_status.set_text(message);\\n    ui.services.borrow_mut().clear();\\n    ui.stacks_status.set_text(message);\\n    clear_list(&ui.stacks_list);\\n",
              "    ui.services_status.set_text(message);\\n    ui.services.borrow_mut().clear();\\n    ui.stacks_status.set_text(message);\\n    ui.profiles_status.set_text(message);\\n    clear_list(&ui.stacks_list);\\n",
              path,
          )
          '''
          script_path.write_text(script[:start] + replacement + script[end:])

          module_path = Path("crates/software-center/src/system_profile.rs")
          module = module_path.read_text()
          old = '''fn encode_field(value: &str) -> String {
              let mut output = String::new();
              for byte in value.as_bytes() {
                  match byte {
                      b'%' | b'\\t' | b'\\n' | b'\\r' => output.push_str(&format!("%{byte:02X}")),
                      _ => output.push(*byte as char),
                  }
              }
              output
          }
          '''
          new = '''fn encode_field(value: &str) -> String {
              let mut output = String::new();
              for character in value.chars() {
                  match character {
                      '%' => output.push_str("%25"),
                      '\\t' => output.push_str("%09"),
                      '\\n' => output.push_str("%0A"),
                      '\\r' => output.push_str("%0D"),
                      _ => output.push(character),
                  }
              }
              output
          }
          '''
          if module.count(old) != 1:
              raise SystemExit("system_profile.rs: encode marker mismatch")
          module_path.write_text(module.replace(old, new, 1))
          PY
      - run: python3 scripts/apply-system-profiles-preview.py
      - run: cargo fmt --all
      - name: Commit System Profiles preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs crates/software-center/src/system_profile.rs docs/ROADMAP.md
          git commit -m "feat(profiles): add export comparison and restore preview"
          git push origin HEAD:feat/system-profiles-preview
