name: Apply APT simulation progress classification

on:
  push:
    branches:
      - feat/apt-simulation-progress-classification
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/apt-simulation-progress-classification
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-apt-progress-classification.py
      - run: cargo fmt --all
      - name: Commit progress classification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/apt_live.rs crates/genixpkgd/src/main.rs crates/genixpkgd/src/transaction.rs
          git commit -m "feat(transactions): classify monotonic APT simulation progress"
          git push origin HEAD:feat/apt-simulation-progress-classification
