name: Fix Software Stacks Lifetime

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/read-only-software-stacks
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Remove needless lifetime
        run: perl -0pi -e "s/pub fn filter_stacks<'a>\(query: &str, category: &str\) -> Vec<&'a SoftwareStack>/pub fn filter_stacks(query: \&str, category: \&str) -> Vec<\&'static SoftwareStack>/" crates/software-center/src/stack_view.rs
      - run: cargo fmt --all
      - name: Commit fix and remove workflow
        run: |
          rm .github/workflows/fix-stack-lifetime.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/stack_view.rs .github/workflows/fix-stack-lifetime.yml
          git commit -m "fix(stacks): simplify static catalogue lifetime"
          git push origin HEAD:feat/read-only-software-stacks
