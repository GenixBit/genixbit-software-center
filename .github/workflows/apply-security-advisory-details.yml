name: Apply Security Advisories

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/read-only-security-advisories
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-security-advisory-details.py
      - run: cargo fmt --all
      - name: Commit Security Advisories
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs crates/software-center/src/security_advisory.rs docs/ROADMAP.md
          git commit -m "feat(security): add offline advisory details"
          git push origin HEAD:feat/read-only-security-advisories
