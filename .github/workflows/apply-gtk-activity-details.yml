name: Apply GTK transaction Activity details

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gtk-transaction-activity-details
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-gtk-activity-details.py
      - run: cargo fmt --all
      - name: Commit Activity details
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/client.rs crates/software-center/src/main.rs
          git commit -m "feat(gtk): add transaction Activity detail timeline"
          git push origin HEAD:feat/gtk-transaction-activity-details
