name: Patch featured catalog UI

on:
  push:
    branches:
      - feat/featured-catalog-and-pagination

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/featured-catalog-and-pagination
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Patch native Discover UI
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/software-center/src/main.rs')
          text = path.read_text()

          text = text.replace('    cell::RefCell,', '    cell::{Cell, RefCell},')
          text = text.replace(
              '    AppRecord, PackageDetailRecord, PackageRecord, SystemHealth, SystemSnapshot, UpdateRecord,\n',
              '    AppRecord, FeaturedCollection, PackageDetailRecord, PackageRecord, SystemHealth,\n    SystemSnapshot, UpdateRecord,\n'
          )
          text = text.replace(
              'const MAX_VISIBLE_PACKAGES: usize = 750;\n',
              'const MAX_VISIBLE_PACKAGES: usize = 750;\nconst CATALOG_PAGE_SIZE: u64 = 40;\n'
          )
          text = text.replace(
              '''    discover_entry: gtk::SearchEntry,
    discover_category: gtk::DropDown,
    discover_status: gtk::Label,
    discover_list: gtk::ListBox,
    packages: Rc<RefCell<Vec<PackageRecord>>>,
    apps: Rc<RefCell<Vec<AppRecord>>>,
''',
              '''    discover_entry: gtk::SearchEntry,
    discover_collection: gtk::DropDown,
    discover_category: gtk::DropDown,
    discover_previous: gtk::Button,
    discover_next: gtk::Button,
    discover_status: gtk::Label,
    discover_list: gtk::ListBox,
    packages: Rc<RefCell<Vec<PackageRecord>>>,
    apps: Rc<RefCell<Vec<AppRecord>>>,
    collections: Rc<RefCell<Vec<FeaturedCollection>>>,
    catalog_query: Rc<RefCell<String>>,
    catalog_offset: Rc<Cell<u64>>,
    catalog_total: Rc<Cell<u64>>,
    catalog_has_more: Rc<Cell<bool>>,
'''
          )

          old_tuple = '''    let (
        discover_page,
        discover_entry,
        discover_button,
        discover_category,
        discover_status,
        discover_list,
    ) = build_discover_page();'''
          new_tuple = '''    let (
        discover_page,
        discover_entry,
        discover_button,
        discover_collection,
        discover_browse,
        discover_category,
        discover_status,
        discover_list,
        discover_previous,
        discover_next,
    ) = build_discover_page();'''
          text = text.replace(old_tuple, new_tuple)

          text = text.replace(
              '''        discover_entry,
        discover_category,
        discover_status,
        discover_list,
        packages: Rc::new(RefCell::new(Vec::new())),
        apps: Rc::new(RefCell::new(Vec::new())),
''',
              '''        discover_entry,
        discover_collection,
        discover_category,
        discover_previous,
        discover_next,
        discover_status,
        discover_list,
        packages: Rc::new(RefCell::new(Vec::new())),
        apps: Rc::new(RefCell::new(Vec::new())),
        collections: Rc::new(RefCell::new(Vec::new())),
        catalog_query: Rc::new(RefCell::new(String::new())),
        catalog_offset: Rc::new(Cell::new(0)),
        catalog_total: Rc::new(Cell::new(0)),
        catalog_has_more: Rc::new(Cell::new(false)),
'''
          )

          search_handler = '''    {
        let ui = ui.clone();
        discover_button.connect_clicked(move |_| start_catalog_search(&ui));
    }
'''
          extra_handlers = search_handler + '''    {
        let ui = ui.clone();
        discover_browse.connect_clicked(move |_| apply_featured_collection(&ui));
    }
    {
        let ui = ui.clone();
        ui.discover_previous
            .clone()
            .connect_clicked(move |_| previous_catalog_page(&ui));
    }
    {
        let ui = ui.clone();
        ui.discover_next
            .clone()
            .connect_clicked(move |_| next_catalog_page(&ui));
    }
'''
          text = text.replace(search_handler, extra_handlers)
          text = text.replace(
              '    start_snapshot_load(&ui);\n    window.present();',
              '    start_snapshot_load(&ui);\n    start_featured_load(&ui);\n    window.present();'
          )

          def replace_function(source, start_marker, end_marker, replacement):
              start = source.index(start_marker)
              end = source.index(end_marker, start)
              return source[:start] + replacement + '\n\n' + source[end:]

          discover_builder = r'''fn build_discover_page() -> (
    gtk::Box,
    gtk::SearchEntry,
    gtk::Button,
    gtk::DropDown,
    gtk::Button,
    gtk::DropDown,
    gtk::Label,
    gtk::ListBox,
    gtk::Button,
    gtk::Button,
) {
    let page = page_box();
    append_page_heading(
        &page,
        "Discover software",
        "Browse curated collections or search verified application metadata from the local AppStream catalogue.",
    );

    let featured_row = gtk::Box::new(gtk::Orientation::Horizontal, 8);
    let collection = gtk::DropDown::from_strings(&["Loading featured collections…"]);
    collection.set_hexpand(true);
    collection.set_sensitive(false);
    collection.set_tooltip_text(Some("Choose a curated GenixBit software collection"));
    let browse = gtk::Button::with_label("Browse Collection");
    browse.set_sensitive(false);
    featured_row.append(&collection);
    featured_row.append(&browse);
    page.append(&featured_row);

    let search_row = gtk::Box::new(gtk::Orientation::Horizontal, 8);
    let entry = gtk::SearchEntry::builder()
        .placeholder_text("Search applications, editors, AI tools…")
        .hexpand(true)
        .build();
    let button = gtk::Button::with_label("Search");
    search_row.append(&entry);
    search_row.append(&button);
    page.append(&search_row);

    let category = gtk::DropDown::from_strings(&["All categories"]);
    category.set_tooltip_text(Some("Filter the current page by AppStream category"));
    category.set_sensitive(false);
    page.append(&category);

    let status = gtk::Label::new(Some("Loading featured collections…"));
    status.set_xalign(0.0);
    status.set_wrap(true);
    page.append(&status);

    let list = gtk::ListBox::new();
    list.set_selection_mode(gtk::SelectionMode::None);
    list.add_css_class("boxed-list");
    let scrolled = gtk::ScrolledWindow::builder()
        .hexpand(true)
        .vexpand(true)
        .child(&list)
        .build();
    page.append(&scrolled);

    let pager = gtk::Box::new(gtk::Orientation::Horizontal, 8);
    pager.set_halign(gtk::Align::End);
    let previous = gtk::Button::with_label("Previous");
    previous.set_sensitive(false);
    let next = gtk::Button::with_label("Next");
    next.set_sensitive(false);
    pager.append(&previous);
    pager.append(&next);
    page.append(&pager);

    (
        page, entry, button, collection, browse, category, status, list, previous, next,
    )
}'''
          text = replace_function(text, 'fn build_discover_page()', 'fn build_list_page(', discover_builder)

          catalog_functions = r'''fn start_featured_load(ui: &UiState) {
    let (sender, receiver) = mpsc::channel();
    thread::spawn(move || {
        let result = tokio::runtime::Builder::new_current_thread()
            .enable_all()
            .build()
            .map_err(anyhow::Error::from)
            .and_then(|runtime| runtime.block_on(client::featured_collections()));
        let _ = sender.send(result);
    });

    let ui = ui.clone();
    glib::timeout_add_local(Duration::from_millis(100), move || match receiver.try_recv() {
        Ok(Ok(collections)) => {
            let titles = collections
                .iter()
                .map(|collection| collection.title.as_str())
                .collect::<Vec<_>>();
            let model = gtk::StringList::new(&titles);
            ui.discover_collection.set_model(Some(&model));
            ui.discover_collection.set_selected(0);
            ui.discover_collection.set_sensitive(!collections.is_empty());
            *ui.collections.borrow_mut() = collections;
            ui.discover_status
                .set_text("Choose a featured collection or enter a search term.");
            glib::ControlFlow::Break
        }
        Ok(Err(error)) => {
            ui.discover_status
                .set_text(&format!("Featured collections unavailable: {error}"));
            glib::ControlFlow::Break
        }
        Err(TryRecvError::Empty) => glib::ControlFlow::Continue,
        Err(TryRecvError::Disconnected) => {
            ui.discover_status
                .set_text("The featured-collection worker stopped unexpectedly.");
            glib::ControlFlow::Break
        }
    });
}

fn apply_featured_collection(ui: &UiState) {
    let index = ui.discover_collection.selected() as usize;
    let collections = ui.collections.borrow();
    let Some(collection) = collections.get(index) else {
        return;
    };
    ui.discover_entry.set_text(&collection.query);
    *ui.catalog_query.borrow_mut() = collection.query.clone();
    ui.catalog_offset.set(0);
    ui.discover_status.set_text(&format!(
        "Browsing {} — {}",
        collection.title, collection.description
    ));
    drop(collections);
    start_catalog_page(ui);
}

fn start_catalog_search(ui: &UiState) {
    let query = ui.discover_entry.text().trim().to_owned();
    if query.is_empty() {
        ui.discover_status
            .set_text("Enter a search term before searching.");
        return;
    }
    *ui.catalog_query.borrow_mut() = query;
    ui.catalog_offset.set(0);
    start_catalog_page(ui);
}

fn previous_catalog_page(ui: &UiState) {
    ui.catalog_offset
        .set(ui.catalog_offset.get().saturating_sub(CATALOG_PAGE_SIZE));
    start_catalog_page(ui);
}

fn next_catalog_page(ui: &UiState) {
    if !ui.catalog_has_more.get() {
        return;
    }
    ui.catalog_offset
        .set(ui.catalog_offset.get().saturating_add(CATALOG_PAGE_SIZE));
    start_catalog_page(ui);
}

fn start_catalog_page(ui: &UiState) {
    let query = ui.catalog_query.borrow().clone();
    if query.is_empty() {
        return;
    }
    let offset = ui.catalog_offset.get();

    clear_list(&ui.discover_list);
    ui.discover_category.set_sensitive(false);
    ui.discover_previous.set_sensitive(false);
    ui.discover_next.set_sensitive(false);
    ui.discover_status.set_text(&format!(
        "Searching AppStream for “{query}” — page {}…",
        offset / CATALOG_PAGE_SIZE + 1
    ));

    let (sender, receiver) = mpsc::channel();
    thread::spawn(move || {
        let result = tokio::runtime::Builder::new_current_thread()
            .enable_all()
            .build()
            .map_err(anyhow::Error::from)
            .and_then(|runtime| {
                runtime.block_on(client::search_catalog_page(
                    &query,
                    offset,
                    CATALOG_PAGE_SIZE,
                ))
            });
        let _ = sender.send(result);
    });

    let ui = ui.clone();
    glib::timeout_add_local(Duration::from_millis(100), move || match receiver.try_recv() {
        Ok(Ok(page)) => {
            *ui.apps.borrow_mut() = page.applications;
            ui.catalog_total.set(page.total);
            ui.catalog_has_more.set(page.has_more);
            populate_catalog_categories(&ui);
            render_catalog(&ui);
            ui.discover_previous.set_sensitive(page.offset > 0);
            ui.discover_next.set_sensitive(page.has_more);
            glib::ControlFlow::Break
        }
        Ok(Err(error)) => {
            ui.discover_status
                .set_text(&format!("AppStream search failed: {error}"));
            glib::ControlFlow::Break
        }
        Err(TryRecvError::Empty) => glib::ControlFlow::Continue,
        Err(TryRecvError::Disconnected) => {
            ui.discover_status
                .set_text("The AppStream search worker stopped unexpectedly.");
            glib::ControlFlow::Break
        }
    });
}'''
          text = replace_function(
              text,
              'fn start_catalog_search(ui: &UiState)',
              'fn populate_catalog_categories(ui: &UiState)',
              catalog_functions,
          )

          old_status = '''    ui.discover_status.set_text(&format!(
        "{} matching applications from {} AppStream results.",
        filtered.len(),
        apps.len()
    ));'''
          new_status = '''    let total = ui.catalog_total.get();
    let page_start = if total == 0 {
        0
    } else {
        ui.catalog_offset.get() + 1
    };
    let page_end = ui
        .catalog_offset
        .get()
        .saturating_add(apps.len() as u64)
        .min(total);
    ui.discover_status.set_text(&format!(
        "{} matching applications on this page. Showing {}–{} of {} AppStream results.",
        filtered.len(),
        page_start,
        page_end,
        total
    ));'''
          text = text.replace(old_status, new_status)

          path.write_text(text)
          PY
          cargo fmt --all
      - name: Commit UI integration
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs
          git commit -m "feat: add featured catalog browsing and pagination UI"
          git push origin HEAD:feat/featured-catalog-and-pagination
