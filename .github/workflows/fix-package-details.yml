name: Fix package detail compile errors

on:
  push:
    branches:
      - feat/package-details-and-health

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/package-details-and-health
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply ownership and lifetime fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          ui_path = Path('crates/software-center/src/main.rs')
          text = ui_path.read_text()
          text = text.replace(
              '''    append_health_row(
                  &ui.health_list,
                  "Update origins",
                  if health.update_sources.is_empty() {
                      "No update repositories currently represented"
                  } else {
                      &health.update_sources.join(", ")
                  },
                  &format!("{} sources", health.update_sources.len()),
              );''',
              '''    let update_origins = if health.update_sources.is_empty() {
                  "No update repositories currently represented".to_owned()
              } else {
                  health.update_sources.join(", ")
              };
              append_health_row(
                  &ui.health_list,
                  "Update origins",
                  &update_origins,
                  &format!("{} sources", health.update_sources.len()),
              );'''
          )
          text = text.replace(
              '''        let ui = ui.clone();
                  let package_name = package.name.clone();
                  row.connect_activated(move |_| start_package_details(&ui, &package_name));
                  ui.installed_list.append(&row);''',
              '''        let callback_ui = ui.clone();
                  let package_name = package.name.clone();
                  row.connect_activated(move |_| start_package_details(&callback_ui, &package_name));
                  ui.installed_list.append(&row);'''
          )
          text = text.replace(
              '''        let ui = ui.clone();
                  let package_name = update.name.clone();
                  row.connect_activated(move |_| start_package_details(&ui, &package_name));
                  ui.updates_list.append(&row);''',
              '''        let callback_ui = ui.clone();
                  let package_name = update.name.clone();
                  row.connect_activated(move |_| start_package_details(&callback_ui, &package_name));
                  ui.updates_list.append(&row);'''
          )
          ui_path.write_text(text)

          service_path = Path('crates/genixpkgd/src/main.rs')
          service = service_path.read_text()
          service = service.replace(
              '''        let update_result = apt::check_updates().await;
                  let apt_available = update_result.is_ok();
                  let updates = update_result.unwrap_or_default();''',
              '''        let apt_available = apt::is_available().await;
                  let updates = apt::check_updates().await.unwrap_or_default();'''
          )
          service_path.write_text(service)
          PY
          cargo fmt --all
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs crates/genixpkgd/src/main.rs
          git commit -m "fix: resolve package detail compile errors"
          git push origin HEAD:feat/package-details-and-health
