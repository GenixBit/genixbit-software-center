name: Apply restart-safe transaction recovery

on:
  push:
    branches:
      - feat/restart-safe-transaction-recovery
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/restart-safe-transaction-recovery
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-restart-recovery.py
      - run: cargo fmt --all
      - name: Commit restart recovery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/main.rs crates/genixpkgd/src/recovery.rs crates/genixpkgd/src/transaction.rs
          git commit -m "feat(recovery): interrupt stale work after daemon restart"
          git push origin HEAD:feat/restart-safe-transaction-recovery
