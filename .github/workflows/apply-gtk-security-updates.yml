name: Apply GTK Security updates page

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gtk-security-updates-page
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-gtk-security-updates.py
      - run: cargo fmt --all
      - name: Commit Security page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs crates/software-center/src/security_view.rs
          git commit -m "feat(security): add read-only updates page"
          git push origin HEAD:feat/gtk-security-updates-page
