name: Apply software stacks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/read-only-software-stacks
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-software-stacks.py
      - run: cargo fmt --all
      - name: Commit software stacks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs crates/software-center/src/stack_view.rs docs/ROADMAP.md
          git commit -m "feat(stacks): add read-only GTK catalogue"
          git push origin HEAD:feat/read-only-software-stacks
