name: Apply GTK transaction Activity summary

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gtk-transaction-activity-summary
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-gtk-activity-summary.py
      - run: cargo fmt --all
      - name: Commit Activity summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs crates/software-center/src/activity_filter.rs
          git commit -m "feat(activity): add summary and filter reset"
          git push origin HEAD:feat/gtk-transaction-activity-summary
