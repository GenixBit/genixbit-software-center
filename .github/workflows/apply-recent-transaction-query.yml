name: Apply recent transaction query

on:
  push:
    branches:
      - feat/recent-transaction-query
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/recent-transaction-query
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-recent-transaction-query.py
      - run: cargo fmt --all
      - name: Commit recent transaction query
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/main.rs crates/genixpkgd/src/transaction.rs crates/genixpkgd/src/transaction_query.rs
          git commit -m "feat(transactions): expose bounded recent transaction records"
          git push origin HEAD:feat/recent-transaction-query
