name: Apply branded design

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/branded-icon-design-tokens
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-branded-design.py
      - run: cargo fmt --all
      - name: Commit branded design
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs docs/ROADMAP.md
          git commit -m "feat(theme): integrate branded design tokens"
          git push origin HEAD:feat/branded-icon-design-tokens
