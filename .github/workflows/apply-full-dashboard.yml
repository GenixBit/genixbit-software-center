name: Apply full read-only dashboard

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/full-read-only-dashboard
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-full-dashboard.py
      - run: cargo fmt --all
      - name: Commit full dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs crates/software-center/src/dashboard_view.rs docs/ROADMAP.md
          git commit -m "feat(dashboard): add full read-only overview"
          git push origin HEAD:feat/full-read-only-dashboard
