name: Fix curated catalogue Clippy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/curated-discover-catalogue
      - name: Apply Clippy fix
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/genixpkgd/src/appstream.rs')
          text = path.read_text()
          old = 'seen.insert(key).then(|| app.clone())'
          if text.count(old) != 1:
              raise SystemExit(f'expected one Clippy marker, found {text.count(old)}')
          path.write_text(text.replace(old, 'seen.insert(key).then_some(app.clone())', 1))
          PY
      - name: Commit Clippy fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/appstream.rs
          git commit -m "fix(discover): satisfy curated catalogue Clippy"
          git push origin HEAD:feat/curated-discover-catalogue
