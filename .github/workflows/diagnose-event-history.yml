name: Fix persistent event history test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/persistent-transaction-event-history
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Rename shadowed preview variable
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/genixpkgd/src/transaction.rs')
          text = path.read_text()
          start = text.index('    fn restores_persistent_lifecycle_events_and_sequence()')
          end = text.index('    #[test]', start)
          block = text[start:end]
          block = block.replace(
              'let (preview, preview_event) = manager',
              'let (restored_preview, preview_event) = manager',
              1,
          )
          block = block.replace(
              '.queue_preview(preview.id)',
              '.queue_preview(restored_preview.id)',
              1,
          )
          if 'let (restored_preview, preview_event)' not in block:
              raise SystemExit('preview rename was not applied')
          path.write_text(text[:start] + block + text[end:])
          PY
          cargo fmt --all
      - name: Commit test fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/transaction.rs
          git commit -m "fix(events): avoid preview helper shadowing in restart test"
          git push origin HEAD:feat/persistent-transaction-event-history
