name: Fix Software Stacks Clippy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/read-only-software-stacks
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Remove unused import
        run: python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/software-center/src/main.rs')
          text = path.read_text()
          text = text.replace('    installed_names, software_stacks, stack_status,\n', '    installed_names, stack_status,\n')
          path.write_text(text)
          PY
      - run: cargo fmt --all
      - name: Commit fix and remove workflow
        run: |
          rm .github/workflows/fix-stack-clippy.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs .github/workflows/fix-stack-clippy.yml
          git commit -m "fix(stacks): remove unused catalogue import"
          git push origin HEAD:feat/read-only-software-stacks
