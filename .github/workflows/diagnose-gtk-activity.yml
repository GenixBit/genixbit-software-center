name: Fix GTK Activity duplicate declarations

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gtk-transaction-activity-page
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Remove duplicated Activity declarations
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/software-center/src/main.rs')
          text = path.read_text()
          replacements = [
              (
                  'const ACTIVITY_LIMIT: u64 = 100;\nconst ACTIVITY_LIMIT: u64 = 100;\n',
                  'const ACTIVITY_LIMIT: u64 = 100;\n',
              ),
              (
                  '    activity_status: gtk::Label,\n    activity_list: gtk::ListBox,\n    activity_status: gtk::Label,\n    activity_list: gtk::ListBox,\n',
                  '    activity_status: gtk::Label,\n    activity_list: gtk::ListBox,\n',
              ),
              (
                  '        activity_status,\n        activity_list,\n        activity_status,\n        activity_list,\n',
                  '        activity_status,\n        activity_list,\n',
              ),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'duplicate marker not found: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          cargo fmt --all
      - name: Commit duplicate cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs
          git commit -m "fix(gtk): deduplicate Activity page state"
          git push origin HEAD:feat/gtk-transaction-activity-page
