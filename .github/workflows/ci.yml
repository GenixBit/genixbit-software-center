name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev libdbus-1-dev >/dev/null
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Check
        id: check
        continue-on-error: true
        run: cargo check --quiet --workspace --all-targets 2>check.log
      - name: Publish compiler diagnostic
        if: steps.check.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo '### Temporary compiler diagnostic'
            echo
            echo '```text'
            tail -n 120 check.log
            echo '```'
          } > diagnostic.md
          gh pr comment "$PR_NUMBER" --body-file diagnostic.md
          exit 1
      - name: Test
        run: cargo test --quiet --workspace
      - name: Clippy
        run: cargo clippy --quiet --workspace --all-targets -- -D warnings
