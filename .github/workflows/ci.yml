name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gtk-featured-pagination
      - name: Install native dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev libdbus-1-dev >/dev/null
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Capture check diagnostics
        run: cargo check --workspace --all-targets --message-format=short > ci-check.log 2>&1 || true
      - name: Commit diagnostics
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-check.log
          git commit -m "chore: capture final GTK compiler diagnostic"
          git push origin HEAD:feat/gtk-featured-pagination
      - name: Check
        run: cargo check --workspace --all-targets
