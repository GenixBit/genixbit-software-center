name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev libdbus-1-dev >/dev/null
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Capture merge-ref check
        run: |
          set +e
          cargo check --workspace --all-targets --message-format=short > ci-merge-check.log 2>&1
          printf '%s\n' "$?" > ci-merge-check.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: merge-compiler-diagnostic
          path: |
            ci-merge-check.log
            ci-merge-check.exit
          if-no-files-found: error
