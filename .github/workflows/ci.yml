name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev libdbus-1-dev >/dev/null
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Capture merge-ref check result
        run: |
          set +e
          cargo check --workspace --all-targets --message-format=short > /tmp/ci-merge-check.log 2>&1
          code=$?
          printf '%s\n' "$code" > /tmp/ci-merge-check.exit
          exit 0
      - name: Persist merge-ref result
        run: |
          git fetch origin feat/gtk-featured-pagination
          git switch feat/gtk-featured-pagination
          cp /tmp/ci-merge-check.log ci-merge-check.log
          cp /tmp/ci-merge-check.exit ci-merge-check.exit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-merge-check.log ci-merge-check.exit
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: preserve PR merge compiler diagnostic"
          git push origin HEAD:feat/gtk-featured-pagination
