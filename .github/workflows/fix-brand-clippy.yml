name: Fix branding Clippy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/branded-icon-design-tokens
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Wire validated design identifiers into runtime
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("crates/software-center/src/main.rs")
          text = path.read_text()
          text = text.replace(
              'const APP_ID: &str = "com.genixbit.SoftwareCenter";',
              'const APP_ID: &str = design_tokens::APP_ICON_NAME;',
              1,
          )
          text = text.replace(
              'fn install_design_tokens() {\n',
              'fn install_design_tokens() {\n    debug_assert!(design_tokens::css_is_complete());\n',
              1,
          )
          path.write_text(text)
          PY
      - run: cargo fmt --all
      - name: Commit fix and remove workflow
        run: |
          rm .github/workflows/fix-brand-clippy.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs .github/workflows/fix-brand-clippy.yml
          git commit -m "fix(design): use validated branding resources at runtime"
          git push origin HEAD:feat/branded-icon-design-tokens
