name: Apply branded icon and design tokens

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/branded-icon-design-tokens
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: python3 scripts/apply-brand-design.py
      - run: cargo fmt --all
      - name: Commit branding integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/main.rs crates/software-center/src/design.rs data/style.css data/icons data/com.genixbit.SoftwareCenter.metainfo.xml docs/ROADMAP.md
          git commit -m "feat(design): add branded icon and design tokens"
          git push origin HEAD:feat/branded-icon-design-tokens
