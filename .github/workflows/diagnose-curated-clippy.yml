name: Diagnose curated catalogue Clippy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/curated-discover-catalogue
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Capture concise Clippy diagnostic
        run: |
          set +e
          cargo clippy --workspace --all-targets -- -D warnings > curated-clippy.log 2>&1
          status=$?
          tail -n 220 curated-clippy.log > curated-clippy-tail.log
          echo "clippy_status=$status" >> "$GITHUB_ENV"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: curated-clippy-diagnostic
          path: curated-clippy-tail.log
          retention-days: 1
