name: Format Software Stacks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/read-only-software-stacks
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit formatting and remove workflow
        run: |
          rm .github/workflows/format-software-stacks.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/software-center/src/stack_view.rs .github/workflows/format-software-stacks.yml
          git commit -m "style(stacks): apply rustfmt"
          git push origin HEAD:feat/read-only-software-stacks
