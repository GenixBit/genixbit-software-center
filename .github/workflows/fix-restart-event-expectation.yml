name: Fix restart event expectation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/restart-safe-transaction-recovery
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Update persistent event restart assertion
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/genixpkgd/src/transaction.rs')
          text = path.read_text()
          start = text.index('    fn restores_persistent_lifecycle_events_and_sequence()')
          end = text.index('    #[test]', start)
          block = text[start:end]
          assertion_start = block.index('        assert_eq!(')
          next_event_start = block.index('        let (_, next_event)', assertion_start)
          block = (
              block[:assertion_start]
              + '''        let restored_events = restored.events(0, 10).expect("restored events should load");
          assert_eq!(restored_events[0], preview_event);
          assert_eq!(restored_events[1], queued_event);
          assert_eq!(restored_events[2].event, "interrupted");
          assert_eq!(
              restored_events[2].transaction_id,
              restored_events[1].transaction_id
          );
          let interrupted_sequence = restored_events[2].sequence;
          '''
              + block[next_event_start:]
          )
          block = block.replace(
              'assert!(next_event.sequence > queued_event.sequence);',
              'assert!(next_event.sequence > interrupted_sequence);',
              1,
          )
          if 'let interrupted_sequence = restored_events[2].sequence;' not in block:
              raise SystemExit('restart event expectation was not applied')
          path.write_text(text[:start] + block + text[end:])
          PY
          cargo fmt --all
      - name: Commit restart expectation fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/genixpkgd/src/transaction.rs
          git commit -m "fix(recovery): expect interrupted event after restart"
          git push origin HEAD:feat/restart-safe-transaction-recovery
